<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Galería completa de Franciele Cominetti en Opta Coliving Punta Carretas."
    />
    <title>Galería | Franciele Cominetti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header site-header--page">
      <a href="index.html" class="logo">
        <span class="logo__mark" aria-hidden="true"></span>
        <span class="logo__text">Franciele Cominetti</span>
      </a>
      <nav class="nav" id="primary-nav" aria-label="Principal">
        <a href="index.html#inicio">Inicio</a>
        <a href="index.html#servicios">Servicios</a>
        <a href="index.html#galeria">Galería</a>
        <a href="index.html#contacto">Contacto</a>
      </nav>
      <button
        type="button"
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="primary-nav"
        aria-label="Abrir menú"
      >
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
      </button>
      <a class="nav-icon" href="index.html#contacto" aria-label="Ir a contacto">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
        </svg>
      </a>
    </header>

    <main class="page-main" id="contenido">
      <header class="page-head">
        <a href="index.html#galeria" class="back-link">← Volver al inicio</a>
        <h1 class="page-head__title">Galería completa</h1>
        <p class="page-head__intro">
          Conocé todos los espacios de Franciele Cominetti en Opta Coliving Punta Carretas.
        </p>
      </header>

      <section class="gallery" id="galeria">
        <div class="gallery__inner">
          <div class="gallery__grid">
            <figure class="gallery__item gallery__item--tall">
              <img src="assets/gallery/gallery-01.png" alt="Sector seco del spa" width="1080" height="1350" loading="lazy" />
              <figcaption>Sector seco</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-02.png" alt="Sector hídrico con reposeras" width="1080" height="1350" loading="lazy" />
              <figcaption>Sector hídrico</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-03.png" alt="Pileta del sector hídrico" width="1080" height="1350" loading="lazy" />
              <figcaption>Piscina de relax</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-04.png" alt="Sala de té" width="1080" height="1350" loading="lazy" />
              <figcaption>Sala do chá</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-05.png" alt="Espacio personal con lockers" width="1080" height="1350" loading="lazy" />
              <figcaption>Espacio personal</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-06.png" alt="Área de duchas privadas" width="1080" height="1350" loading="lazy" />
              <figcaption>Área de duchas</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-07.png" alt="Consultorio de depilación láser" width="1080" height="1350" loading="lazy" />
              <figcaption>Depilación láser</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-08.png" alt="Consultorio facial" width="1080" height="1350" loading="lazy" />
              <figcaption>Consultorio facial</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-09.png" alt="Ducha escocesa" width="1080" height="1350" loading="lazy" />
              <figcaption>Ducha escocesa</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-10.png" alt="Suite privada" width="1080" height="1350" loading="lazy" />
              <figcaption>Suite privada</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-11.png" alt="Consultorio de masajes" width="1080" height="1350" loading="lazy" />
              <figcaption>Consultorio de masajes</figcaption>
            </figure>
            <figure class="gallery__item">
              <img src="assets/gallery/gallery-12.png" alt="Piscina panorámica" width="1080" height="1350" loading="lazy" />
              <figcaption>Piscina panorámica</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__brand">Franciele Cominetti</p>
      <p class="site-footer__copy">© <span id="year"></span> · Masajes y bienestar</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
